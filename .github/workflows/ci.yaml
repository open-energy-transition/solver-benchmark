name: CI

on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  # workflow_dispatch:

jobs:
  CI:
    runs-on: ubuntu-latest

    env:
      PY_VERSION: "3.12"
      NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
      NEXT_PUBLIC_EMAILJS_SERVICE_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_SERVICE_ID }}
      NEXT_PUBLIC_EMAILJS_TEMPLATE_ID: ${{ secrets.NEXT_PUBLIC_EMAILJS_TEMPLATE_ID }}
      NEXT_PUBLIC_EMAILJS_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_EMAILJS_PUBLIC_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip pre-commit
          pip install -r website/requirements.txt
          # For validation scripts (TODO collect these in a requirements.txt file?)
          pip install ruamel.yaml

      - name: Check code formatting
        run: |
          pre-commit install
          pre-commit run --all-files

      - name: Check benchmark metadata and results
        run: |
          python tests/validate_urls.py
          if git diff --quiet; then
            echo "git diff is empty, benchmark URLs conform to expected format"
          else
            git diff
            printf "ERROR: benchmark URLs do not match expected format, please run the following command:\npython tests/validate_urls.py"
            exit 1
          fi
          python benchmarks/merge_metadata.py
          if git diff --quiet; then
            echo "git diff is empty, metadata must be up to date"
          else
            git diff
            printf "ERROR: git diff non empty, metadata needs updating, please run the following command:\npython benchmarks/merge_metadata.py"
            exit 1
          fi
          python tests/validate_urls_exist.py results/metadata.yaml
          python tests/validate_results.py

      - name: Run Streamlit App Action
        uses: streamlit/streamlit-app-action@v0.0.3
        with:
            app-path: website/app.py

      - name: Set FORK_PR environment variable
        if: ${{ (github.event.pull_request.head.repo.fork == true || github.actor == 'dependabot[bot]') && github.event_name == 'pull_request' }}
        run: echo "FORK_PR=true" >> $GITHUB_ENV

      - name: Check Next.js build
        run: |
          echo "Checking Next.js build..."
          if [ -d "website-nextjs" ] && [ -f "website-nextjs/package.json" ]; then
            cd website-nextjs

            # Check if reCAPTCHA key is set
            if [ "$FORK_PR" != "true" ]; then
              if [ -z "$NEXT_PUBLIC_RECAPTCHA_SITE_KEY" ]; then
                echo "Error: NEXT_PUBLIC_RECAPTCHA_SITE_KEY is not set"
                exit 1
              else
                echo "✓ reCAPTCHA key is configured"
              fi
            else
              echo "Skipping reCAPTCHA key check for PRs from forks or Dependabot."
            fi
            npm install
            npm run build
            cd ..
          else
            echo "Next.js project not found at website-nextjs/package.json. Skipping build check."
          fi

      - name: Setup Conda for benchmark runner
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: ${{ env.PY_VERSION }}
          # TODO cache conda pkgs dir

      - name: Run sample benchmarks
        shell: bash -el {0}
        run: |
          ./runner/benchmark_all.sh -y "tests" tests/sample_benchmarks_metadata.yaml
          echo ""
          cat results/benchmark_results.csv
          if awk -F',' 'NR>1 {if ($6 != "ok") exit 1}' results/benchmark_results.csv; then
            echo "All benchmarks ran successfully."
          else
            echo "Some benchmarks did not complete successfully."
            exit 1
          fi

  accessibility-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd website-nextjs
          npm install

      - name: Build Next.js
        run: |
          cd website-nextjs
          npm run build

      - name: Install Google Chrome (for ChromeDriver matching)
        run: |
          # Install Chrome so any driver manager can detect the browser version
          sudo apt-get update
          sudo apt-get install -y wget gnupg ca-certificates
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          # Attempt to install Chrome 145.x (pin major version). If unavailable, fall back to stable.
          CHROME_MAJOR=145
          if sudo apt-get install -y "google-chrome-stable=${CHROME_MAJOR}*"; then
            echo "Installed Google Chrome matching major ${CHROME_MAJOR}"
          else
            echo "Requested Chrome ${CHROME_MAJOR} not available via apt; installing stable instead"
            sudo apt-get install -y google-chrome-stable
          fi
          # Print version for debugging
          google-chrome --version || which google-chrome-stable || true

      - name: Install matching ChromeDriver for apt Chrome via browser-driver-manager
        run: |
          cd website-nextjs
          npm install --no-save browser-driver-manager
          # Detect the apt-installed Chrome version and ask bdm to install the matching chromedriver
          CHROME_VER=$(google-chrome --version 2>/dev/null | awk '{print $3}' || true)
          echo "Detected Chrome version: $CHROME_VER"
          if [ -n "$CHROME_VER" ]; then
            # Try to install the chromedriver matching the full Chrome version first
            if npx browser-driver-manager install chromedriver --chromedriver-version="$CHROME_VER"; then
              echo "Installed chromedriver matching $CHROME_VER"
            else
              # Fall back to installing chromedriver for the major version
              CHROME_MAJOR=$(echo "$CHROME_VER" | cut -d'.' -f1)
              echo "Falling back to chromedriver for major version: $CHROME_MAJOR"
              npx browser-driver-manager install chromedriver --chromedriver-version="$CHROME_MAJOR" || true
            fi
          else
            echo "Could not detect apt chrome version; installing chromedriver latest as fallback"
            npx browser-driver-manager install chromedriver || true
          fi
          # Resolve the chromedriver binary and export for later steps
          CHROMEDRIVER_PATH=$(npx browser-driver-manager path chromedriver 2>/dev/null || which chromedriver 2>/dev/null || echo "")
          echo "CHROMEDRIVER_PATH=$CHROMEDRIVER_PATH" >> $GITHUB_ENV
          echo "Installed ChromeDriver at: $CHROMEDRIVER_PATH"
          # Also expose Chrome binary path for tests
          CHROME_BIN_PATH=$(which google-chrome-stable || which google-chrome || echo "")
          echo "CHROME_BIN_PATH=$CHROME_BIN_PATH" >> $GITHUB_ENV
          echo "Chrome binary: $CHROME_BIN_PATH"
          if [ -n "$CHROME_BIN_PATH" ]; then
            $CHROME_BIN_PATH --version || true
          fi
          if [ -n "$CHROMEDRIVER_PATH" ]; then
            $CHROMEDRIVER_PATH --version || true
          fi

      - name: Start Next.js server in background
        run: |
          cd website-nextjs
          npm start &

      - name: Wait for server to be ready
        run: |
          timeout 90 bash -c 'until curl -sf http://localhost:3000 > /dev/null; do sleep 2; done' || exit 1

      - name: Extract URLs from sitemap
        run: |
          cd website-nextjs
          npm run axe:extract

      - name: Run axe-core accessibility tests on all pages
        env:
          # AXE flags
          AXE_CHROME_OPTIONS: "no-sandbox,disable-dev-shm-usage,disable-setuid-sandbox,headless=new,disable-gpu"
          AXE_LOAD_DELAY: "5000"
        run: |
          cd website-nextjs
          # CHROME_BIN_PATH is set earlier into GITHUB_ENV; export it for the test
          export CHROME_BIN="$CHROME_BIN_PATH"
          echo "Using CHROME_BIN=$CHROME_BIN"
          npm run axe:test

      - name: Upload accessibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-report
          path: website-nextjs/axe-results.json
