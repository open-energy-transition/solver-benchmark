benchmarks:
  ReEDS-USA-CapacityExpansion:
    Short description: 132-zone representation of contiguous USA with 416 time slices in 2050 (last solve year of sequential solve with 10 stages). Currently enacted state and federal policies, including emissions standards, tax incentives, renewable portfolio standards/clean energy standards, and technology-specific capacity mandates are included.
    Modelling framework: ReEDS
    Model name: ReEDS
    Version: Git commit SHA c783b8bd4dc1f70c841abd7738ef27db9d89a7cb
    Contributor(s)/Source: Claire Halloran, National Laboratory of the Rockies, https://github.com/ReEDS-Model/ReEDS
    License: CC BY 4.0
    Problem class: LP
    Application: Infrastructure & Capacity Expansion
    Sectoral focus: Power-only
    Sectors: Electric
    Time horizon: Single-stage (1-year)
    MILP features: None
    Sizes:
    - Name: 132-416ts
      URL: https://storage.googleapis.com/solver-benchmarks/instances/ReEDS-USA-CapacityExpansion-132-416ts.mps.gz
      Temporal resolution: 416 time slices
      Spatial resolution: 132 regions
      Realistic: true
      Realistic motivation: This spatiotemporal resolution is used in the ReEDS Standard Scenarios studies (https://docs.nlr.gov/docs/fy25osti/92256.pdf)
