  genx-4_three_zones_w_policies_slack-no_uc-3-1h:
    Short description: This is a one-year example with hourly resolution which contains
      zones representing Massachusetts, Connecticut, and Maine. It is designed to
      show how to use slack variables to meet a policy constraint if it cannot be
      met cost-effectively by normal means. The ten represented resources include
      natural gas, solar PV, wind, and lithium-ion battery storage. It additionally
      contains example input files (inside the policies folder) establishing slack
      variables for policy constraints (e.g. the Capacity Reserve Margin, CO2 Cap,
      etc.). These slack variables allow the relevant constraints to be violated at
      the cost of a specified objective function penalty, which can be used to either
      identify problematic constraints without causing infeasibilities in GenX, or
      to set price caps beyond which policies are no longer enforced. These slack
      variables will only be created if the relevant input data (Capacity_reserve_margin_slack.csv, CO2_cap_slack.csv, Energy_share_requirement_slack.csv,
      or the PriceCap column in Minimum_capacity_requirement.csv and Maximum_capacity_requirement.csv)
      are present. If any of these inputs are not present, GenX will instantiate the
      relevant policy as a hard constraint, which will throw an infeasibility error
      if violated.
    Contributor(s)/Source: https://github.com/jump-dev/open-energy-modeling-benchmarks;
      Daniele Lerede, Open Energy Transition
