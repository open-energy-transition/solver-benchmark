benchmarks:
  SWITCH-3-zone-tiny:
    Short description: A minimal 3-zone SWITCH tutorial model demonstrating core SWITCH
      functionality and several custom modules.
    Modelling framework: SWITCH
    Model name: 3_zone_tiny
    Version:
    Contributor(s)/Source: Vamsi Priya Goli, Open Energy Transition; https://github.com/switch-model/switch_tutorial/tree/master/3_zone_tiny
    License: CC BY 4.0
    Problem class: MILP
    Application: Infrastructure & Capacity Expansion
    Sectoral focus: Power-only
    Sectors: Electric
    Time horizon: Multi-stage (2 stages)
    MILP features: Unit commitment
    Sizes:
    - Name: 3-6ts
      Size: S
      URL: https://storage.googleapis.com/solver-benchmarks/instances/SWITCH-3-zone-tiny-3-6ts.lp.gz
      Temporal resolution: 6 time slices (first investment period), 1 time slice (second
        investment period)
      Spatial resolution: 3 nodes
      Realistic: false
      Num. constraints: 795
      Num. variables: 582
      Num. continuous variables: 580
      Num. integer variables: 2
      Num. nonzeros: 2000
  SWITCH-3-zone-toy:
    Short description: A 3-zone SWITCH toy model with two investment periods, where
      the first period has higher temporal resolution. Demonstrates core SWITCH functionality
      and selected custom modules.
    Modelling framework: SWITCH
    Model name: 3zone_toy
    Version:
    Contributor(s)/Source: Vamsi Priya Goli, Open Energy Transition; https://github.com/switch-model/switch/tree/master/examples/3zone_toy
    License: CC BY 4.0
    Problem class: MILP
    Application: Infrastructure & Capacity Expansion
    Sectoral focus: Power-only
    Sectors: Electric
    Time horizon: Multi-stage (2 stages)
    MILP features: Unit commitment
    Notes: This toy example illustrates how SWITCH can be used to construct and run
      a multi-period, multi-zone capacity expansion model. Results have not been fully
      evaluated.
    Sizes:
    - Name: 3-6ts
      Size: S
      URL: https://storage.googleapis.com/solver-benchmarks/instances/SWITCH-3-zone-toy-3-6ts.lp.gz
      Temporal resolution: 6 time slices (first investment period), 1 time slice (second
        investment period)
      Spatial resolution: 3 nodes
      Realistic: false
      Num. constraints: 775
      Num. variables: 618
      Num. continuous variables: 616
      Num. integer variables: 2
      Num. nonzeros: 2108
  SWITCH-3zone-toy-stochastic-PySP:
    Short description: A 3-zone stochastic SWITCH model constructed using PySP, illustrating
      scenario-based stochastic optimization in a multi-period power system context.
    Modelling framework: SWITCH
    Model name: 3zone_toy_stochastic_PySP
    Version:
    Contributor(s)/Source: Vamsi Priya Goli, Open Energy Transition; https://github.com/switch-model/switch/tree/master/examples/3zone_toy_stochastic_PySP
    License: CC BY 4.0
    Problem class: MILP
    Application: Infrastructure & Capacity Expansion
    Sectoral focus: Power-only
    Sectors: Electric
    Time horizon: Multi-stage (2 stages)
    MILP features: Unit commitment
    Sizes:
    - Name: 3-6ts
      Size: S
      URL: https://storage.googleapis.com/solver-benchmarks/instances/SWITCH-3zone-toy-stochastic-PySP-3-6ts.lp.gz
      Temporal resolution: 6 time slices (first investment period), 1 time slice (second
        investment period)
      Spatial resolution: 3 nodes
      Realistic: false
      Num. constraints: 716
      Num. variables: 580
      Num. continuous variables: 578
      Num. integer variables: 2
